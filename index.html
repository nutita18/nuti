<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#ee5f98"><title>Idle School Tycoon | โรงเรียนเล็ก ฝันใหญ่</title>
<style>
:root{--ink:#193653;--muted:#72869b;--pink:#ed5e98;--sky:#dff5ff;--green:#16b978;--gold:#ffbd40;--line:#e9f0f6;--shadow:0 10px 25px #142d461c}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans Thai","Sarabun",Arial,sans-serif;color:var(--ink);background:linear-gradient(145deg,#ddf4ff,#fff2f7,#fffaf2)}button{font:inherit;border:0;cursor:pointer;font-weight:800}button:disabled{opacity:.5;cursor:not-allowed}.app{width:min(100%,480px);min-height:100vh;margin:auto;background:#fcfeff;box-shadow:0 0 42px #19365329;padding-bottom:78px}.top{position:sticky;top:0;z-index:4;background:#fcfefff2;backdrop-filter:blur(12px);padding:13px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:9px;margin-bottom:10px}.logo{font-size:24px;background:linear-gradient(135deg,#80d9ff,#ff83b2);height:43px;width:43px;border-radius:14px;display:grid;place-items:center}.brand h1{margin:0;font-size:17px}.brand small{color:var(--muted);font-weight:700}.gear{margin-left:auto;background:#eef6fc;border-radius:12px;height:40px;width:40px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.stat{border:1px solid var(--line);background:white;border-radius:12px;padding:6px}.stat label{display:block;font-size:9px;color:var(--muted);font-weight:800}.stat strong{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.money strong{color:#d98700}.know strong{color:#228eca}.fame strong{color:#d98700}.rate strong{color:var(--green)}.campus{position:relative;margin:9px 13px 12px;height:235px;border-radius:25px;overflow:hidden;background:linear-gradient(#81d2fa 0 61%,#86cf76 61%);box-shadow:var(--shadow)}.sun{position:absolute;top:12px;right:18px;font-size:32px}.cloud{position:absolute;font-size:29px;color:white}.c1{left:15px;top:22px}.c2{right:65px;top:54px;font-size:24px}.school{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);height:103px;width:194px;background:#fff4db;border:4px solid #efae68;border-radius:7px}.roof{position:absolute;left:-13px;right:-13px;top:-30px;height:32px;background:var(--pink);clip-path:polygon(6% 100%,18% 0,82% 0,94% 100%)}.sign{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#73cbee;color:white;font-size:9px;font-weight:900;padding:4px 12px;border-radius:20px;white-space:nowrap}.wins{display:flex;position:absolute;top:47px;left:17px;right:17px;justify-content:space-between}.wins i{height:25px;width:29px;background:#d1f0ff;border:3px solid #75c0e7;border-radius:4px}.door{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:39px;width:29px;background:#4e9bd3;border-radius:15px 15px 0 0}.path{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:57px;width:75px;background:#e9c48d;clip-path:polygon(36% 0,64% 0,100% 100%,0 100%)}.tree{position:absolute;bottom:48px;font-size:41px}.tl{left:13px}.tr{right:13px}.child{position:absolute;bottom:24px;font-size:28px;animation:walk 12s linear infinite}.b{animation-delay:-6s;bottom:17px}@keyframes walk{from{transform:translateX(-45px)}to{transform:translateX(490px)}}.pop{position:absolute;top:70px;left:50%;transform:translateX(-50%);opacity:0;background:white;border-radius:20px;padding:4px 10px;color:var(--green);font-size:12px;font-weight:900}.pop.go{animation:pop .8s ease}@keyframes pop{10%{opacity:1;transform:translate(-50%,10px)}100%{opacity:0;transform:translate(-50%,-25px)}}.event{margin:0 13px 13px;padding:10px;background:#fff5d9;border:1px solid #ffe1a1;border-radius:17px;display:flex;gap:9px;align-items:center}.event .emoji{font-size:27px}.event div{flex:1}.event small{color:#c07b00;font-size:10px;font-weight:900}.event strong{display:block;font-size:13px}.event p{font-size:10px;color:var(--muted);margin:1px 0;font-weight:700}.bonus{background:var(--gold);color:#825000;border-radius:11px;padding:9px;font-size:11px}.tabs{padding:0 13px}.panel{display:none}.panel.active{display:block}.heading{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}.heading h2{font-size:17px;margin:0}.tag{font-size:10px;font-weight:900;color:#db4c84;background:#ffe5ee;padding:5px 9px;border-radius:20px}.list{display:flex;flex-direction:column;gap:9px}.card{display:grid;grid-template-columns:55px 1fr 86px;gap:9px;align-items:center;border:1px solid var(--line);background:white;border-radius:17px;padding:9px;box-shadow:0 5px 13px #142d460c}.card.lock{background:#f4f7f9;filter:saturate(.7)}.ico{height:55px;width:55px;border-radius:15px;background:var(--t);font-size:29px;display:grid;place-items:center}.name{font-size:13px;font-weight:900}.meta{font-size:10px;color:var(--muted);font-weight:700;margin-top:3px}.out{font-size:10px;color:var(--green);font-weight:900;margin-top:4px}.buy{background:linear-gradient(#39d992,#13b86c);box-shadow:0 4px 0 #07955c;border-radius:12px;min-height:45px;color:white;font-size:10px}.buy span{display:block;font-size:11px}.skill{background:linear-gradient(#9786ff,#7557df);box-shadow:0 4px 0 #5637c1}.mission{border:1px solid var(--line);border-radius:16px;background:white;padding:11px;display:flex;gap:8px;align-items:center;margin-bottom:8px}.mi{flex:1}.mi strong{font-size:12px}.mi small{display:block;color:#bf7800;font-weight:800;font-size:10px}.track{height:6px;background:#edf2f6;border-radius:20px;overflow:hidden;margin-top:7px}.fill{height:100%;background:linear-gradient(90deg,#ffc33f,#fe914d)}.claim{font-size:10px;padding:10px;background:var(--gold);border-radius:10px;color:#805000}.awards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.award{background:white;border:1px solid var(--line);border-radius:16px;text-align:center;padding:11px;box-shadow:var(--shadow)}.award.off{filter:grayscale(1);opacity:.45}.award b{display:block;font-size:12px}.award span{font-size:29px}.promote{margin-top:11px;background:#213e60;color:white;padding:13px;border-radius:18px;display:flex;align-items:center;gap:8px}.promote div{flex:1}.promote h3{font-size:14px;margin:4px 0}.promote small{font-size:10px;opacity:.8}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);height:72px;width:min(100%,480px);background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr)}.tab{background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;gap:3px}.tab span{font-size:22px}.tab.on{color:var(--pink)}.modalbg{position:fixed;inset:0;z-index:20;background:#10233777;display:flex;align-items:center;justify-content:center;padding:22px}.modalbg.hide{display:none}.modal{width:min(395px,100%);background:white;padding:20px;border-radius:23px;text-align:center}.modal h2{margin:7px}.reward{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:14px 0}.reward div{background:#f0f8fe;border-radius:12px;padding:9px;font-weight:900}.reward small{display:block;font-size:10px;color:var(--muted)}.primary{width:100%;background:linear-gradient(#ff84b4,var(--pink));border-radius:13px;padding:12px;color:white}.toast{position:fixed;z-index:30;bottom:85px;left:50%;transform:translate(-50%,15px);opacity:0;background:var(--ink);color:white;padding:12px;border-radius:13px;font-size:12px;font-weight:800;transition:.2s}.toast.show{transform:translate(-50%,0);opacity:1}
</style></head><body><div class="app"><header class="top"><div class="brand"><div class="logo">🏫</div><div><h1>Idle School Tycoon</h1><small id="rank">โรงเรียนเล็กในชุมชน</small></div><button class="gear" onclick="resetGame()">↻</button></div><div class="stats"><div class="stat money"><label>🪙 งบ</label><strong id="money"></strong></div><div class="stat know"><label>📚 ความรู้</label><strong id="know"></strong></div><div class="stat fame"><label>⭐ ชื่อเสียง</label><strong id="fame"></strong></div><div class="stat rate"><label>⚡/วินาที</label><strong id="rate"></strong></div></div></header><section class="campus"><div class="sun">☀️</div><div class="cloud c1">☁</div><div class="cloud c2">☁</div><div class="tree tl">🌳</div><div class="tree tr">🌳</div><div class="school"><div class="roof"></div><div class="sign">โรงเรียนเล็ก ฝันใหญ่</div><div class="wins"><i></i><i></i><i></i></div><div class="door"></div></div><div class="path"></div><div class="child">🧒🏻</div><div class="child b">👧🏻</div><div class="pop" id="pop"></div></section><section class="event"><span class="emoji">🎊</span><div><small>กิจกรรมโรงเรียน</small><strong>เปิดภาคเรียนใหม่</strong><p>รับโบนัสรายได้ถาวร +10%</p></div><button class="bonus" id="event" onclick="claimEvent()">รับโบนัส</button></section><main class="tabs"><section class="panel active" id="buildings"><div class="heading"><h2>🏗️ อาคารโรงเรียน</h2><span class="tag" id="students"></span></div><div class="list" id="rooms"></div></section><section class="panel" id="teachers"><div class="heading"><h2>👩🏻‍🏫 บุคลากร</h2><span class="tag">โบนัสอาคาร</span></div><div class="list" id="staff"></div></section><section class="panel" id="missions"><div class="heading"><h2>📋 ภารกิจ</h2><span class="tag" id="missionTag"></span></div><div id="jobs"></div></section><section class="panel" id="awards"><div class="heading"><h2>🏆 รางวัล</h2><span class="tag">ความสำเร็จ</span></div><div class="awards" id="achievement"></div><div class="promote"><div><small>เลื่อนระดับโรงเรียน</small><h3 id="next"></h3><small id="require"></small></div><button class="primary" id="promote" onclick="promote()">เลื่อนระดับ</button></div></section></main><nav class="nav"><button class="tab on" data-show="buildings"><span>🏫</span>อาคาร</button><button class="tab" data-show="teachers"><span>👩🏻‍🏫</span>ครู</button><button class="tab" data-show="missions"><span>📋</span>ภารกิจ</button><button class="tab" data-show="awards"><span>🏆</span>รางวัล</button></nav></div><div class="modalbg hide" id="offline"><div class="modal"><div style="font-size:48px">🎒</div><h2>ยินดีต้อนรับกลับ!</h2><p id="away"></p><div class="reward"><div>🪙<b id="offM"></b><small>งบ</small></div><div>📚<b id="offK"></b><small>ความรู้</small></div><div>⭐<b id="offF"></b><small>ชื่อเสียง</small></div></div><button class="primary" onclick="takeOffline()">รับรางวัล</button></div></div><div class="toast" id="toast"></div>
<script>
const KEY='idleSchoolTycoonOnlineV1',rooms={classroom:{n:'ห้องเรียนพื้นฐาน',i:'📖',t:'#e2f5ff',c:100,u:0,m:5,k:2,f:.05,s:5},cafeteria:{n:'โรงอาหาร',i:'🍱',t:'#fff0d2',c:450,u:850,m:24,k:0,f:.1,s:8},library:{n:'ห้องสมุด',i:'📚',t:'#f0eaff',c:1400,u:2800,m:58,k:22,f:.3,s:12},computer:{n:'ห้องคอมพิวเตอร์',i:'💻',t:'#dbfaed',c:4300,u:9500,m:165,k:46,f:.7,s:18},sports:{n:'สนามกีฬา',i:'⚽',t:'#ffe5ef',c:11800,u:28000,m:410,k:30,f:2,s:25},science:{n:'ห้องวิทยาศาสตร์',i:'🔬',t:'#e8f5ff',c:32000,u:85000,m:980,k:180,f:4,s:32}},teachers={homeroom:{n:'ครูประจำชั้น',i:'👩🏻‍🏫',r:'classroom',p:600,b:1.25,x:2,d:30},librarian:{n:'ครูบรรณารักษ์',i:'👨🏻‍🏫',r:'library',p:6000,b:1.35,x:2,d:30},tech:{n:'ครูเทคโนโลยี',i:'👩🏻‍💻',r:'computer',p:25000,b:1.5,x:2.5,d:25},coach:{n:'ครูพละ',i:'🧑🏻‍🏫',r:'sports',p:65000,b:1.6,x:3,d:25}},ranks=[['โรงเรียนเล็กในชุมชน',0,1],['โรงเรียนชุมชนเข้มแข็ง',1000,1.12],['โรงเรียนคุณภาพ',10000,1.3],['โรงเรียนต้นแบบ',100000,1.6]],missions=[['c2','อัปเกรดห้องเรียนเป็น Level 2',200,s=>s.b.classroom.l>=2,s=>s.b.classroom.l,2],['teacher','จ้างครูประจำชั้น',500,s=>s.t.homeroom.o,s=>s.t.homeroom.o?1:0,1],['food','สร้างโรงอาหาร',900,s=>s.b.cafeteria.o,s=>s.b.cafeteria.o?1:0,1],['k','สะสมความรู้ 2,500 คะแนน',2500,s=>s.k>=2500,s=>s.k,2500],['lib','สร้างห้องสมุด',3600,s=>s.b.library.o,s=>s.b.library.o?1:0,1],['f','มีชื่อเสียง 100 คะแนน',7000,s=>s.f>=100,s=>s.f,100]],achievements=[['🔨','ก้าวแรก',s=>s.up>0],['👩🏻‍🏫','ครูคนแรก',s=>s.t.homeroom.o],['📚','รักการอ่าน',s=>s.b.library.o],['⭐','โดดเด่น',s=>s.f>=1000]];function fresh(){let b={},t={};Object.keys(rooms).forEach((x,i)=>b[x]={o:i==0,l:i==0?1:0});Object.keys(teachers).forEach(x=>t[x]={o:false,until:0});return{m:500,k:0,f:0,b,t,done:[],rank:0,event:false,up:0,last:Date.now()}}let s=(()=>{try{return JSON.parse(localStorage.getItem(KEY))||fresh()}catch{return fresh()}})(),pending;const $=x=>document.getElementById(x),fmt=x=>{x=Math.floor(x);return x>=1e6?(x/1e6).toFixed(1)+'M':x>=1e3?(x/1e3).toFixed(1)+'K':x.toLocaleString('th-TH')},lv=l=>l?Math.pow(1.68,l-1):0,staffFor=r=>Object.entries(teachers).find(x=>x[1].r==r),boost=r=>{let x=staffFor(r);if(!x||!s.t[x[0]].o)return 1;return x[1].b*(Date.now()<s.t[x[0]].until?x[1].x:1)},val=(id,p)=>s.b[id].o?rooms[id][p]*lv(s.b[id].l)*boost(id):0,total=p=>Object.keys(rooms).reduce((a,id)=>a+val(id,p),0)*(p=='m'&&s.event?1.1:1)*ranks[s.rank][2],cost=id=>s.b[id].o?Math.floor(rooms[id].c*Math.pow(1.62,s.b[id].l-1)):rooms[id].u,save=()=>{s.last=Date.now();localStorage.setItem(KEY,JSON.stringify(s))};function say(x){$('toast').textContent=x;$('toast').classList.add('show');clearTimeout(say.t);say.t=setTimeout(()=>$('toast').classList.remove('show'),1900)}function render(){ $('money').textContent=fmt(s.m);$('know').textContent=fmt(s.k);$('fame').textContent=fmt(s.f);$('rate').textContent='+'+fmt(total('m'));$('rank').textContent=ranks[s.rank][0];$('students').textContent='👨‍🎓 '+fmt(Object.keys(rooms).reduce((a,x)=>a+(s.b[x].o?rooms[x].s*s.b[x].l:0),0))+' คน';$('event').disabled=s.event;$('event').textContent=s.event?'ทำงานอยู่ ✓':'รับโบนัส';$('rooms').innerHTML=Object.entries(rooms).map(([id,d])=>`<article class="card ${s.b[id].o?'':'lock'}"><div class="ico" style="--t:${d.t}">${d.i}</div><div><div class="name">${d.n}</div><div class="meta">${s.b[id].o?'Level '+s.b[id].l:'🔒 งบประมาณ '+fmt(cost(id))}</div><div class="out">${s.b[id].o?'+'+fmt(val(id,'m'))+' 🪙 • +'+fmt(val(id,'k'))+' 📚 /วินาที':'ยังไม่เปิดใช้งาน'}</div></div><button class="buy" onclick="buy('${id}')" ${s.m<cost(id)?'disabled':''}>${s.b[id].o?'อัปเกรด':'สร้าง'}<span>🪙 ${fmt(cost(id))}</span></button></article>`).join('');$('staff').innerHTML=Object.entries(teachers).map(([id,d])=>{let q=s.t[id],open=s.b[d.r].o,ready=Date.now()>q.until;return `<article class="card ${open?'':'lock'}"><div class="ico" style="--t:#ffe5ee">${d.i}</div><div><div class="name">${d.n}</div><div class="meta">ประจำ${rooms[d.r].n} • โบนัส +${Math.round((d.b-1)*100)}%</div><div class="out">${q.o?(ready?'พร้อมใช้สกิล x'+d.x:'กำลังใช้สกิล'):open?'ค่าจ้าง '+fmt(d.p):'ต้องสร้างอาคารก่อน'}</div></div><button class="buy ${q.o?'skill':''}" onclick="hire('${id}')" ${!open||(!q.o&&s.m<d.p)?'disabled':''}>${q.o?'ใช้สกิล':'จ้าง'}<span>${q.o?'⚡ '+d.d+' วิ':'🪙 '+fmt(d.p)}</span></button></article>`}).join('');$('missionTag').textContent=s.done.length+'/'+missions.length+' สำเร็จ';$('jobs').innerHTML=missions.map(x=>{let done=s.done.includes(x[0]),got=Math.min(x[4](s),x[5]),ok=x[3](s);return `<div class="mission"><div class="mi"><strong>${done?'✅ ':''}${x[1]}</strong><small>รางวัล 🪙 ${fmt(x[2])} • ${fmt(got)}/${fmt(x[5])}</small><div class="track"><div class="fill" style="width:${Math.min(100,got/x[5]*100)}%"></div></div></div><button class="claim" onclick="claim('${x[0]}')" ${!ok||done?'disabled':''}>${done?'รับแล้ว':'รับ'}</button></div>`}).join('');$('achievement').innerHTML=achievements.map(x=>`<div class="award ${x[2](s)?'':'off'}"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('');let next=ranks[s.rank+1];$('next').textContent=next?next[0]:'สูงสุดแล้ว';$('require').textContent=next?'ต้องการชื่อเสียง '+fmt(next[1])+' • รายได้ x'+next[2]:'โรงเรียนแห่งความฝัน';$('promote').disabled=!next||s.f<next[1] }function buy(id){let c=cost(id);if(s.m<c)return;s.m-=c;if(s.b[id].o){s.b[id].l++;s.up++;say(rooms[id].n+' อัปเกรดสำเร็จ')}else{s.b[id].o=true;s.b[id].l=1;say('สร้าง'+rooms[id].n+'สำเร็จ 🎉')}save();render()}function hire(id){let d=teachers[id],q=s.t[id];if(!q.o){s.m-=d.p;q.o=true;say('ต้อนรับ'+d.n+'!')}else{q.until=Date.now()+d.d*1000;say('เปิดสกิลรายได้ x'+d.x)}save();render()}function claim(id){let x=missions.find(m=>m[0]==id);if(!x||s.done.includes(id)||!x[3](s))return;s.done.push(id);s.m+=x[2];say('รับรางวัล +'+fmt(x[2])+' เหรียญ');save();render()}function claimEvent(){if(s.event)return;s.event=true;s.m+=300;say('รับโบนัสเปิดภาคเรียน +10%');save();render()}function promote(){let x=ranks[s.rank+1];if(!x||s.f<x[1])return;let keep=s.rank+1;s=fresh();s.rank=keep;s.m=1000;say('เลื่อนระดับเป็น '+ranks[keep][0]);save();render()}function tick(){let m=total('m'),k=total('k'),f=total('f');s.m+=m;s.k+=k;s.f+=f;$('pop').textContent='+'+fmt(m)+' 🪙';$('pop').classList.remove('go');void $('pop').offsetWidth;$('pop').classList.add('go');save();render()}function offline(){let sec=Math.min(28800,Math.floor((Date.now()-s.last)/1000));if(sec<12)return;pending=[total('m')*sec,total('k')*sec,total('f')*sec];$('away').textContent='โรงเรียนทำงานต่อเนื่องระหว่างที่คุณไม่อยู่ '+Math.floor(sec/3600)+' ชั่วโมง '+Math.floor(sec%3600/60)+' นาที';$('offM').textContent=fmt(pending[0]);$('offK').textContent=fmt(pending[1]);$('offF').textContent=fmt(pending[2]);$('offline').classList.remove('hide')}function takeOffline(){s.m+=pending[0];s.k+=pending[1];s.f+=pending[2];$('offline').classList.add('hide');say('รับรายได้ออฟไลน์แล้ว 🎉');save();render()}function resetGame(){if(confirm('เริ่มเกมใหม่และลบความคืบหน้าหรือไม่?')){s=fresh();save();render();say('เริ่มเกมใหม่แล้ว')}}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x==b));document.querySelectorAll('.panel').forEach(x=>x.classList.toggle('active',x.id==b.dataset.show))});offline();render();setInterval(tick,1000);
</script></body></html>
